body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f4f1;color:#1a1a1a;font-size:14px}
header{background:#1a1a1a;color:#fff;padding:1.1rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}

.main{max-width:1200px;margin:0 auto;padding:1.1rem 1rem 3rem}

.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scnt{font-weight:400;color:#ccc}

.pane{display:none;font-size:11px;color:#666;line-height:1.6}

.empty{text-align:center;color:#bbb;font-size:14px;padding:3rem 1rem}
footer{text-align:center;font-size:11px;color:#bbb;margin-top:2rem;padding-top:1.5rem;border-top:1px solid #e8e8e5}
@media(max-width:600px){.grid{grid-template-columns:1fr}header h1{font-size:15px}}

const CI={
  'Abrasive':{color:'#8B3A3A',use:'Metal grinding, surface prep, weld cleanup, rust/scale removal, deburring sharp edges.',target:'Iron workers, welders, pipefitters, steel erectors, fabricators, GCs.',tip:'<b>Bundle move:</b> Pair flap discs and cut-off wheels with angle grinder sales. Ask about material (mild steel vs. stainless vs. aluminum) to nail grit and bond type. Push case quantities — worn abrasives are an OSHA hazard and a repeat sale.'},
  'Adhesives':{color:'#6B4E1A',use:'Structural bonding, setting injection anchors, concrete crack repair.',target:'Masonry contractors, concrete subs, tile setters, GCs.',tip:'<b>Anchor pairing:</b> Every anchor SKU is a companion adhesive sale. Ask "how are you setting your anchors?" Highlight pull-strength specs to structural GCs.'},
  'Air Tools':{color:'#2E5A8E',use:'Pneumatic fastening, impact wrenches, nailers, blow guns.',target:'Framers, roofers, finish carpenters, auto/truck mechanics, GCs.',tip:'<b>System sell:</b> Air tools need a compressor, hose, and fittings — sell the whole system. Ask about PSI and CFM requirements to match the tool to the supply.'},
  'Anchor':{color:'#5C3D8F',use:'Concrete anchoring for equipment, pipe hangers, structural attachments, seismic bracing.',target:'MEP contractors, concrete contractors, ironworkers, GCs.',tip:'<b>Spec compliance:</b> Ask about ICC-ES approval requirements. Drop-in anchors need a setting tool — bundle it. Ask about concrete thickness and load requirements to upsell the right size.'},
  'Annular Cutter':{color:'#3D6B3D',use:'Precision holes in structural steel plate, beams, columns, HVAC duct, pipe flanges.',target:'Ironworkers, structural steel fabricators, HVAC contractors, welders, millwrights.',tip:'<b>Replacement cycle:</b> Ask how many holes per week to set a reorder cadence. Sell cutting oil with every cutter — it triples tool life. Confirm mag drill brand for shank compatibility.'},
  'Batteries':{color:'#B07000',use:'Powering Milwaukee M18 cordless platform tools on jobsite.',target:'Any contractor running Milwaukee M18 tools — virtually every trade.',tip:'<b>Platform lock-in:</b> Once a crew is M18, every new tool is a battery opportunity. Upsell from 2.0Ah to 5.0/6.0Ah HD packs. Sell multi-packs for crews with multiple tools running simultaneously.'},
  'Bit Accessories':{color:'#5A5A8E',use:'Screw gun bit holders, magnetic bit holders, extensions, depth attachments.',target:'All trades — drywall subs, framers, electricians, plumbers, GCs.',tip:'<b>Add-on every time:</b> Never sell a drill bit or screw without asking "need bit holders or extensions?" High-margin, fast-turnover accessories. Magnetic holders reduce drop time on elevated work.'},
  'Cleaning':{color:'#5A7A5A',use:'Jobsite degreasing, solvent cleaning, surface prep before adhesives or coatings.',target:'All contractors, maintenance crews.',tip:'<b>Consumable revenue:</b> Set up a standing order for active jobsites. Pair with surface prep before adhesive or sealant sales.'},
  'Compressor':{color:'#8E5A2E',use:'Powering pneumatic tools, tire inflation, blowout, pressure testing.',target:'Framers, roofers, finish carpenters, GCs, HVAC crews.',tip:'<b>System approach:</b> Ask about CFM demand before recommending a unit. Pair with air hose, fittings, and pneumatic tools. Portable pancake for finish work; twin-stack for framing.'},
  'Drill Bits':{color:'#2E5A5A',use:'Drilling through wood, metal, concrete, masonry, steel plate, stainless steel.',target:'All trades — electricians, plumbers, framers, ironworkers, concrete subs.',tip:'<b>Material match:</b> "What are you drilling through?" is your opener. Cobalt for stainless; SDS for concrete; standard HSS for wood/mild steel. Sell spare sets — bits break on jobsites constantly.'},
  'Electric Motor':{color:'#4A4A8E',use:'Replacement motors for industrial equipment, pumps, compressors.',target:'Maintenance contractors, facilities managers, millwrights.',tip:'<b>Emergency replacement:</b> Position as a go-to for motor failures — downtime is expensive. Build relationships with maintenance managers who need fast turnaround.'},
  'Extension Cord':{color:'#8E6A2E',use:'Powering tools at job sites where permanent power is unavailable, temporary power distribution.',target:'All contractors — electricians, framers, concrete crews, GCs.',tip:'<b>Gauge matters:</b> Educate on 12/3 vs. 14/3 — undersized cords trip breakers and damage tools. Lighted-end cords are OSHA-friendly. Sell multiple per crew — cords disappear on large sites.'},
  'Extractors':{color:'#6B3D3D',use:'Removing broken bolts, damaged screws, stripped fasteners from metal and wood.',target:'Maintenance contractors, ironworkers, pipefitters, GCs.',tip:'<b>Problem solver sale:</b> Extractors are often urgent — broken bolt means downtime. Keep in stock. Pair with drill bits (pre-drill required). Upsell to a full set rather than single size.'},
  'Fall Protection':{color:'#8E2E2E',use:'OSHA-compliant fall arrest for work above 6 ft — roofing, structural steel, elevated platforms.',target:'Roofers, ironworkers, steel erectors, GCs with OSHA oversight, safety managers.',tip:'<b>OSHA urgency:</b> Fall protection at 6 ft is non-negotiable. Sell the complete system: harness + lanyard or SRL + anchor point. Annual inspection and replacement is mandatory — set a reorder reminder.'},
  'Fasteners':{color:'#6B5A2E',use:'Attaching track to concrete and steel (powder actuated), nail-in for masonry, plastic anchors for light-duty.',target:'Drywall contractors, framers, MEP subs, concrete contractors, GCs.',tip:'<b>Match to tool:</b> Powder actuated pins must match the Ramset/Hilti/Simpson tool — confirm brand first. Sell pins by the box of 100. Nail-in anchors are faster than drilling; lead with speed advantage.'},
  'Hand Tools':{color:'#4A4A4A',use:'Wrenches, pliers, punches, chisels, pry bars, shovels — every-trade essential tools.',target:'All trades.',tip:'<b>Brand premium:</b> Proto and Milwaukee carry strong warranties — position against cheap imports. "Buy once, cry once" resonates with experienced tradespeople. Wrenches are frequently lost; sell multi-packs proactively.'},
  'Hoists':{color:'#5A3D6B',use:'Lifting materials, equipment, and loads — chain hoists, lever hoists, beam trolleys.',target:'Ironworkers, riggers, millwrights, mechanical contractors, HVAC crews.',tip:'<b>Rated capacity = liability:</b> Never let a customer guess on hoist capacity. Pair with rigging chain and shackles. Annual inspection is required — position as their inspection reminder for recurring sales.'},
  'Hole Cutter':{color:'#3D5A6B',use:'Large-diameter holes in steel plate, pipe flanges, conduit entry, HVAC ductwork, structural members.',target:'HVAC contractors, electricians, ironworkers, structural fabricators.',tip:'<b>Carbide vs. HSS:</b> CT7 carbide = harder steel and longer runs; pitch the upgrade for high-volume customers. Sell pilot pins separately — they wear faster. Ask about cutter brand compatibility.'},
  'Impact Socket':{color:'#3D3D6B',use:'High-torque fastening of structural bolts, heavy equipment — designed for impact wrench use.',target:'Ironworkers, structural steel erectors, heavy equipment mechanics, mechanical contractors.',tip:'<b>Impact-rated only:</b> Standard chrome sockets crack under impact — SHOCKWAVE or equivalent required. Match drive size (1/2", 3/4", 1") to their impact gun. Sell full sets for new structural crews.'},
  'LUMBER':{color:'#7A5A2E',use:'Structural framing, blocking, temporary bracing, concrete forms.',target:'Framers, concrete subs, GCs.',tip:'<b>Convenience premium:</b> Jobsite delivery eliminates lumberyard trips. Pair with framing screws and fasteners for a complete material package.'},
  'Ladders':{color:'#6B4A2E',use:'Accessing elevated work areas, electrical panels, above-ceiling work, roofing, painting.',target:'All trades — electricians, HVAC, drywall, painters, GCs.',tip:'<b>Type matters:</b> Type 1A (300 lb.) fiberglass is the commercial standard — fiberglass = electrical safety. Werner = trusted brand. Lead with OSHA weight rating compliance; ladder failures are a major liability.'},
  'Locks':{color:'#4A4A6B',use:'Jobsite security, equipment lockout/tagout (LOTO) compliance, storage containers.',target:'All contractors, safety managers, GCs requiring LOTO programs.',tip:'<b>LOTO volume sale:</b> OSHA LOTO standard requires individual locks per authorized employee. Sell sets of 6–12. Master-keyed sets for supervisors are an easy upsell.'},
  'Lubricants':{color:'#5A6B3D',use:'Thread lube, anti-seize on bolts, penetrating oil for frozen fasteners, cutting oil for drilling and tapping.',target:'All trades — ironworkers, pipefitters, machinists, maintenance contractors.',tip:'<b>Bundle with consumables:</b> Every drill bit and tap set sale should include cutting oil — it triples tool life and is a $10–15 add-on. Anti-seize is critical for stainless and dissimilar metals.'},
  'Marking Chalk':{color:'#5A5A3D',use:'Snap line layout for framing, concrete screeds, roofing, tile installation, rebar placement.',target:'Framers, concrete contractors, roofers, tile setters, carpenters.',tip:'<b>Chalk reel bundle:</b> Never sell chalk without asking if they need a chalk reel. Blue is standard; red for permanent; fluorescent for roofing. High-visibility chalk sells easily to outdoor concrete crews.'},
  'Marking Paint':{color:'#5A3D5A',use:'Utility marking, rebar/anchor layout on concrete, jobsite boundaries, survey references.',target:'Concrete subs, survey crews, GCs, utility contractors.',tip:'<b>Volume opportunity:</b> Large concrete pours go through multiple cans. Ask about project scope — a big pour could be a 24-can order. Upside-down marking paint for wand applicators is a specialty item that earns loyalty.'},
  'Measurement':{color:'#3D6B6B',use:'Tape measures, levels, layout tools for precise construction measurements.',target:'All trades.',tip:'<b>High-turnover item:</b> Tape measures take abuse and get lost constantly — sell multi-packs. Milwaukee and Stabila are brand-preferred. Add to every order as a suggested add-on.'},
  'Milwaukee':{color:'#C8310A',use:'Full M18 cordless and corded power tools — drills, saws, impacts, grinders, pipe wrenches, pliers, and accessories for every trade.',target:'All trades on the Milwaukee M18 platform — electricians, plumbers, framers, concrete subs, ironworkers, GCs.',tip:'<b>Ecosystem advantage:</b> M18 is the #1 reason contractors standardize — one battery for every tool. Demo tools whenever possible. Highlight the 5-year tool warranty. Parts availability reduces replacement cost.'},
  'Miscellaneous- Office, etc.':{color:'#888888',use:'Office and administrative supplies for business operations.',target:'Business owners, office managers.',tip:'<b>One-stop-shop:</b> Position as a convenience for contractors who already order tools and supplies — eliminate another vendor.'},
  'POWER TOOL':{color:'#8E2E5A',use:'Angle grinders, corded saws, specialty power tools for heavy-duty cutting, grinding, and fabrication.',target:'Welders, fabricators, ironworkers, concrete contractors, GCs.',tip:'<b>Corded = continuous power:</b> Position corded tools for production applications where runtime matters. Metabo grinders are preferred by welders for durability. Ask about current brand and warranty needs.'},
  'PPE':{color:'#2E6B8E',use:'Gloves, hard hats, safety glasses, hi-viz vests, coveralls, respirators, earplugs — mandatory OSHA PPE for all construction sites.',target:'All contractors, safety managers, GCs enforcing PPE compliance on job sites.',tip:'<b>Compliance + crew size = volume:</b> GCs require all subs to provide PPE — ask about crew size for bulk pricing. Tyvek coveralls are consumable. Safety glasses scratch and break — sell by the box of 10+. Build a "jobsite safety kit" bundle for new crews.'},
  'Paint':{color:'#5A8E5A',use:'Surface coating, marking, touch-up.',target:'General contractors, painting subs.',tip:'<b>Convenience sale:</b> Jobsite delivery of paint eliminates a supply house trip. Pair with application accessories.'},
  'Parts Misc.':{color:'#888888',use:'Replacement parts for tools and equipment.',target:'All trades with equipment needing maintenance.',tip:'<b>Downtime prevention:</b> Parts on hand mean equipment back in service faster. Position as a quick-source alternative to manufacturer lead times.'},
  'Pipe Threader':{color:'#5A3D6B',use:'Cutting threads on pipe for plumbing, HVAC, and fire sprinkler systems.',target:'Plumbers, pipefitters, HVAC contractors, fire sprinkler contractors.',tip:'<b>Die replacement cycle:</b> Pipe dies wear out — ask how much pipe they thread per week and set a reorder cadence. Sell complete die sets.'},
  'Poly Sheet':{color:'#3D5A3D',use:'Concrete curing, weather protection, dust containment, vapor barrier, temporary enclosures.',target:'Concrete contractors, framers, drywall subs, GCs.',tip:'<b>Seasonal demand:</b> Cold-weather concreting drives poly sheet sales in winter. Pair with tape. Sell full rolls — better margin and eliminates waste on large pours.'},
  'Rigging':{color:'#6B3D2E',use:'Lifting slings, shackles, chains, hooks, wear pads — assembling rigging systems for crane picks and material lifting.',target:'Ironworkers, riggers, crane operators, millwrights, heavy construction GCs.',tip:'<b>Rated capacity is critical:</b> Rigging failures are fatal — always confirm WLL for the application. Sell complete assemblies. Wear pads extend sling life — easy upsell with every sling. OSHA annual inspection = reorder contact.'},
  'Safety':{color:'#8E6A2E',use:'First aid cabinets, jobsite canopies, heat illness prevention (drink mixes, freezer pops), general jobsite safety equipment.',target:'GCs, safety managers, large crews in heat, all contractors with OSHA compliance requirements.',tip:'<b>Heat illness = OSHA requirement:</b> Federal OSHA requires heat illness prevention programs — drink mix and hydration supplies are not optional in warm weather. First aid cabinets are required at threshold crew sizes. Sell safety "starter kits" to new GC customers.'},
  'Saw Blade':{color:'#5A5A8E',use:'Cutting wood, metal, pipe, conduit, rebar depending on blade type — reciprocating, circular, chop saw, bandsaw.',target:'All trades by blade type: plumbers/electricians (recip blades), framers/carpenters (circ saw wood), ironworkers/welders (chop saw metal).',tip:'<b>Match blade to material:</b> Wrong blade = slow cut, damaged material, blade failure. "What are you cutting and with what saw?" opens every blade conversation. Sell multi-packs of recip blades — they break frequently.'},
  'Screws':{color:'#3D6B3D',use:'Fastening drywall to steel and wood, steel framing connections, concrete attachment, sheet metal, general wood construction.',target:'Drywall subs, metal framers, concrete subs, MEP contractors, GCs.',tip:'<b>Bulk pricing drives volume:</b> Screws are a commodity — compete on bulk pricing and availability. Ask "how many boxes a week?" for standing orders. Know the substrate: drywall to LGS = fine thread; drywall to wood = coarse thread; concrete = blue Tapcon-style.'},
  'Sealant':{color:'#5A3D8E',use:'Air and water sealing at penetrations, fire-rated caulk at rated assemblies, acoustical sealant for sound-rated walls.',target:'Drywall subs, GCs, insulation contractors, firestopping contractors.',tip:'<b>Code compliance angle:</b> Fire-rated sealant at penetrations is a code requirement — inspectors enforce it. Acoustical sealant is required by spec in hotels, multifamily, and medical buildings.'},
  'Service Charge':{color:'#888888',use:'Delivery, rush fees, service charges.',target:'All customers.',tip:'<b>Delivery value:</b> Frame service charges as "we bring it to your jobsite." The time savings often exceeds the fee. Build delivery charges into quotes transparently.'},
  'Shop Supplies':{color:'#6B6B3D',use:'Jobsite consumables — trash bags, tape, rags, heaters for cold-weather work, general maintenance supplies.',target:'All contractors, jobsite superintendents, GCs.',tip:'<b>Recurring consumable revenue:</b> Shop supplies are ordered repeatedly — set up a standing weekly or bi-weekly delivery. Heater sales spike in fall/winter; stock up early. Bundle with safety supply orders.'},
  'Sockets':{color:'#4A4A6B',use:'Bolt tightening and loosening, general mechanical work with ratchet or breaker bar.',target:'All trades requiring fastener work — ironworkers, mechanics, plumbers, GCs.',tip:'<b>Drive size and depth:</b> Always confirm drive size (3/8", 1/2") before selling. Milwaukee SHOCKWAVE impact-rated sockets upsell easily from standard chrome. Sell sets rather than individual sockets.'},
  'Tap & Die Set':{color:'#6B4A6B',use:'Cutting new threads in metal, repairing damaged threads on bolts and tapped holes, chasing stripped threads.',target:'Ironworkers, machinists, maintenance contractors, fabricators, pipefitters.',tip:'<b>Thread repair = urgent need:</b> Stripped threads mean stopped work — often an emergency purchase. HSS taps handle harder metals — pitch the upgrade for stainless or alloy steel. Always pair with cutting oil.'},
  'Tension Tie':{color:'#3D6B5A',use:'Structural tension connections, hold-downs, shear connections in light-gauge framing.',target:'Framers, structural engineers, GCs on engineered framing systems.',tip:'<b>Engineered system sale:</b> Tension ties are often spec\'d by the structural engineer — know the spec number. Pair with the compatible screws and installation instructions.'},
  'Threaded Rod':{color:'#5A6B6B',use:'Structural hanging systems, pipe/duct hanger rods, seismic bracing, anchor bolt extensions, all-thread for custom fastening.',target:'MEP contractors (pipe/duct hangers), ironworkers, concrete subs, GCs.',tip:'<b>Bundle the system:</b> Threaded rod alone is rarely the whole order — sell with compatible hex nuts and flat washers. Ask about rod diameter, grade, and length. High-volume MEP jobs go through dozens of sticks — set up a project account.'},
  'Vise':{color:'#6B3D6B',use:'Holding pipe, stock, or work pieces during cutting, threading, forming, and welding.',target:'Plumbers, pipefitters, fabricators, machinists.',tip:'<b>Bench setup sale:</b> A vise sale often means a new shop or service truck setup — ask what else they need. Pipe vise vs. machinist vise distinction matters — always confirm application.'},
  'WELDING':{color:'#8E3D2E',use:'Structural and specialty welding — gloves, consumables, and welding accessories.',target:'Welders, ironworkers, fabricators, maintenance contractors.',tip:'<b>Bundle PPE with consumables:</b> Welding gloves are consumed heavily — sell by the case. Pair with abrasives (flap discs for weld cleanup) and safety glasses. Build a relationship with the shop foreman for recurring orders.'},
  'Water':{color:'#2E5A8E',use:'Jobsite hydration for workers.',target:'GCs, large crew superintendents.',tip:'<b>OSHA heat illness requirement:</b> Fresh drinking water is required by OSHA on construction sites. Position as part of a complete heat illness prevention package with drink mix and shade canopy.'},
  'Water Hose':{color:'#2E6B5A',use:'Concrete curing, dust suppression, equipment washdown, general water delivery on jobsite.',target:'Concrete contractors, masonry contractors, GCs.',tip:'<b>Durability pitch:</b> Jobsite hoses take abuse — sell commercial-grade over consumer grade. Pair with spray nozzle and hose reel for large sites.'}
};

const allCats=[...new Set(data.map(d=>d.c.split(':')[0]).filter(Boolean))].sort();
let acat='all';
 
function qcls(q){return q>5?'qty-in':q>0?'qty-low':'qty-out';}
function qlbl(q){return q>5?q+' in stock':q>0?q+' (low)':'Out of stock';}
function ccls(q){return q>5?'card-in':q>0?'card-low':'card-out';}
 
let uid=0;
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fd=data.filter(d=>{
    const mc=acat==='all'||d.c.split(':')[0]===acat;
    const mq=!q||d.n.toLowerCase().includes(q)||d.s.toLowerCase().includes(q)||d.c.toLowerCase().includes(q);
    return mc&&mq;
  });
  document.getElementById('stats').textContent=fd.length+' of '+data.length+' products';
  const bc={};
  fd.forEach(d=>{const pc=d.c.split(':')[0]||'Other';if(!bc[pc])bc[pc]=[];bc[pc].push(d);});
  let h='';
  if(!fd.length){h='<div class="empty">No products match your search.</div>';}
  else{
    const ord=acat==='all'?Object.keys(bc).sort():[acat];
    ord.forEach(pc=>{
      if(!bc[pc])return;
      const inf=ci(pc);
      h+=`<div class="section"><div class="section-hdr"><span class="dot" style="background:${inf.color}"></span>${pc} <span class="scnt">(${bc[pc].length})</span></div><div class="grid">`;
      bc[pc].forEach(d=>{
        const id='c'+(uid++);
        h+=`<div class="card ${ccls(d.q)}">
<div class="left">
<div class="sku-badge">${d.s}</div>
<div class="price-tag">${d.p}</div>
<div class="qty-tag ${qcls(d.q)}">${qlbl(d.q)}</div>
</div>
<div class="card-body">
<div class="card-name">${d.n}</div>
<div class="card-cat">${d.c||'Other'}</div>
<div class="tabs">
<button class="tab on" onclick="st('${id}','u',this)">Use Cases</button>
<button class="tab" onclick="st('${id}','t',this)">Customers</button>
<button class="tab" onclick="st('${id}','s',this)">Sales Tips</button>
</div>
<div id="${id}_u" class="pane on">${inf.use}</div>
<div id="${id}_t" class="pane">${inf.target}</div>
<div id="${id}_s" class="pane"><div class="tip-box"><span class="tip-lbl">Sales Strategy</span>${inf.tip}</div></div>
</div></div>`;
      });
      h+='</div></div>';
    });
  }
  document.getElementById('output').innerHTML=h;
}
 
function st(id,panel,el){
  const cb=el.closest('.card-body');
  cb.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  cb.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(id+'_'+panel).classList.add('on');
}
 
function buildFilters(){
  const row=document.getElementById('filters');
  let h='<span class="pill active" onclick="sc(\'all\',this)">All</span>';
  allCats.forEach(c=>{
    const col=(CI[c]||DEF).color;
    h+=`<span class="pill" onclick="sc('${c}',this)" style="border-left:3px solid ${col}">${c}</span>`;
  });
  row.innerHTML=h;
}
 
function sc(id,el){
  acat=id;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  render();
}
 
buildFilters();
render();
